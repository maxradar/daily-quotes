<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cita del Día</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lora:ital@0;1&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lora', serif;
            background: linear-gradient(135deg, #f5f1e8 0%, #e8e3d8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .quote-card {
            background: white;
            padding: 60px 50px;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            border-top: 3px solid #c5a992;
            animation: fadeIn 0.8s ease-in;
            position: relative;
            overflow: hidden;
        }

        .quote-card::before {
            content: '"';
            position: absolute;
            top: 10px;
            left: 20px;
            font-size: 80px;
            color: #dcc9b8;
            font-family: 'Playfair Display', serif;
            opacity: 0.6;
        }

        .quote-text {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 600;
            color: #2c2416;
            line-height: 1.6;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
            font-style: italic;
        }

        .quote-author {
            font-size: 16px;
            color: #8b7355;
            font-style: normal;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .quote-author::before {
            content: '— ';
        }

        .date-info {
            font-size: 13px;
            color: #a89080;
            margin-top: 20px;
            font-style: italic;
            letter-spacing: 0.5px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .quote-card {
                padding: 40px 30px;
            }

            .quote-text {
                font-size: 24px;
            }

            .quote-card::before {
                font-size: 60px;
                top: 5px;
                left: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="quote-card">
            <div class="quote-text" id="quoteText">Cargando cita...</div>
            <div class="quote-author" id="quoteAuthor">Autor</div>
            <div class="date-info" id="dateInfo">Hoy</div>
        </div>
    </div>

    <script>
        const quotes = [
            {
                text: "La vida es 10% lo que te sucede y 90% cómo reaccionas ante ello.",
                author: "Charles R. Swindoll"
            },
            {
                text: "El único modo de hacer un gran trabajo es amar lo que haces.",
                author: "Steve Jobs"
            },
            {
                text: "La perseverancia no es una carrera larga; es muchas carreras cortas, una tras otra.",
                author: "Walter Elliot"
            },
            {
                text: "No puedes cambiar el viento, pero puedes ajustar tus velas.",
                author: "Dolly Parton"
            },
            {
                text: "El futuro pertenece a aquellos que creen en la belleza de sus sueños.",
                author: "Eleanor Roosevelt"
            },
            {
                text: "La única manera de hacer lo imposible es creer que es posible.",
                author: "Charles Kingsleigh"
            },
            {
                text: "Cada día es una nueva oportunidad para cambiar tu vida.",
                author: "Ralph Marston"
            },
            {
                text: "No busques hacer tu vida más grande; busca vivir más.",
                author: "Henry David Thoreau"
            },
            {
                text: "El éxito no es final, el fracaso no es fatal: lo que importa es el coraje para continuar.",
                author: "Winston Churchill"
            },
            {
                text: "La mejor manera de predecir el futuro es crearlo.",
                author: "Peter Drucker"
            },
            {
                text: "Todo lo que necesitas es la disposición de intentarlo.",
                author: "Stephen Karam"
            },
            {
                text: "La grandeza no viene de hacer cosas extraordinarias, sino de hacer cosas ordinarias con extraordinaria excelencia.",
                author: "John Wooden"
            },
            {
                text: "Tu tiempo es limitado, no lo desperdicies viviendo la vida de otro.",
                author: "Steve Jobs"
            },
            {
                text: "La única batalla que puedes perder es aquella que abandonas.",
                author: "Napoleón Bonaparte"
            },
            {
                text: "El secreto de avanzar es comenzar.",
                author: "Mark Twain"
            },
            {
                text: "No esperes a estar listo. Probablemente nunca lo estarás.",
                author: "Roy T. Bennett"
            },
            {
                text: "La vida no espera por ti. Adelanta y construye tu propio camino.",
                author: "Ralph Marston"
            },
            {
                text: "Lo que ves depende principalmente en lo que buscas.",
                author: "John Burroughs"
            },
            {
                text: "La única verdadera sabiduría es saber que no sabes nada.",
                author: "Sócrates"
            },
            {
                text: "No se trata de cuánto trabajo haces, sino de cuánta pasión pones en él.",
                author: "Regina Sugars"
            }
        ];

        function getQuoteOfDay() {
            // Calcular qué cita mostrar basado en el día actual
            const today = new Date();
            const startDate = new Date('2024-01-01');
            const dayNumber = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
            const quoteIndex = dayNumber % quotes.length;
            return quotes[quoteIndex];
        }

        function formatDate(date) {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            return date.toLocaleDateString('es-ES', options);
        }

        function loadQuote() {
            const quote = getQuoteOfDay();
            document.getElementById('quoteText').textContent = quote.text;
            document.getElementById('quoteAuthor').textContent = quote.author;
            document.getElementById('dateInfo').textContent = formatDate(new Date());
        }

        // Cargar la cita cuando el DOM esté listo
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadQuote);
        } else {
            loadQuote();
        }
    </script>
</body>
</html>

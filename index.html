function loadQuote() {
  const today = new Date();
  const startDate = new Date('2026-05-04');
  const dayNumber = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
  const quoteIndex = dayNumber % quotes.length;
  const quote = quotes[quoteIndex];
  
  document.getElementById('quoteText').textContent = quote.text;
  document.getElementById('quoteAuthor').textContent = quote.author;
  
  const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  document.getElementById('dateInfo').textContent = new Date().toLocaleDateString('es-ES', options);
}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cita del Día - Windows 98</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'MS Sans Serif', Arial, sans-serif;
            background: #008080;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .window {
            background: linear-gradient(to right, #000080, #1084d7);
            border: 2px solid;
            border-color: #dfdfdf #808080 #808080 #dfdfdf;
            box-shadow: 1px 1px 0 0 #ffffff inset, -1px -1px 0 0 #808080 inset;
            width: 100%;
            max-width: 550px;
            overflow: hidden;
        }

        .title-bar {
            background: linear-gradient(to right, #000080, #1084d7);
            color: white;
            padding: 2px 2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            font-weight: bold;
            font-family: 'MS Sans Serif', Arial, sans-serif;
        }

        .title-text {
            flex: 1;
            padding-left: 4px;
        }

        .window-buttons {
            display: flex;
            gap: 2px;
            padding-right: 2px;
        }

        .btn-minimize, .btn-maximize, .btn-close {
            width: 16px;
            height: 14px;
            background: #c0c0c0;
            border: 1px solid;
            border-color: #dfdfdf #808080 #808080 #dfdfdf;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: black;
            font-weight: bold;
        }

        .btn-minimize:active, .btn-maximize:active, .btn-close:active {
            border-color: #808080 #dfdfdf #dfdfdf #808080;
        }

        .window-content {
            background: #c0c0c0;
            padding: 8px;
            border: 2px solid;
            border-color: #dfdfdf #808080 #808080 #dfdfdf;
        }

        .quote-box {
            background: white;
            border: 2px solid;
            border-color: #808080 #dfdfdf #dfdfdf #808080;
            padding: 16px;
            margin-bottom: 8px;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .quote-text {
            font-family: 'MS Sans Serif', Arial, sans-serif;
            font-size: 13px;
            color: #000000;
            line-height: 1.5;
            margin-bottom: 12px;
            font-style: italic;
        }

        .quote-author {
            font-family: 'MS Sans Serif', Arial, sans-serif;
            font-size: 11px;
            color: #666666;
            text-align: right;
            font-weight: bold;
        }

        .quote-author::before {
            content: '— ';
        }

        .date-info {
            font-family: 'MS Sans Serif', Arial, sans-serif;
            font-size: 10px;
            color: #808080;
            margin-bottom: 8px;
        }

        .buttons-bar {
            display: flex;
            justify-content: flex-end;
            gap: 4px;
        }

        .btn {
            background: #c0c0c0;
            border: 2px solid;
            border-color: #dfdfdf #808080 #808080 #dfdfdf;
            padding: 3px 12px;
            font-family: 'MS Sans Serif', Arial, sans-serif;
            font-size: 11px;
            cursor: pointer;
            color: black;
            min-width: 75px;
            text-align: center;
            font-weight: bold;
        }

        .btn:active {
            border-color: #808080 #dfdfdf #dfdfdf #808080;
        }

        @media (max-width: 600px) {
            .window {
                max-width: 100%;
            }

            .quote-text {
                font-size: 12px;
            }

            .quote-box {
                min-height: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-text">📝 Cita del Día</div>
            <div class="window-buttons">
                <div class="btn-minimize">_</div>
                <div class="btn-maximize">□</div>
                <div class="btn-close">✕</div>
            </div>
        </div>

        <div class="window-content">
            <div class="date-info" id="dateInfo">Hoy</div>
            
            <div class="quote-box">
                <div class="quote-text" id="quoteText">Cargando cita...</div>
                <div class="quote-author" id="quoteAuthor">Autor</div>
            </div>

            <div class="buttons-bar">
                <button class="btn">Aceptar</button>
            </div>
        </div>
    </div>

  { text: "No podemos hacer grandes cosas, solo cosas pequeñas con gran amor.", author: "Madre Teresa" },
  { text: "Si juzgas a las personas, no tienes tiempo para amarlas.", author: "Madre Teresa" },
  { text: "La alegría profunda del corazón es como un imán que señala el camino de la vida.", author: "Madre Teresa" },
  { text: "La felicidad no es tener mucho, sino necesitar poco.", author: "Anónimo" },
  { text: "El mejor momento para plantar un árbol fue hace veinte años; el segundo mejor momento es hoy.", author: "Proverbio chino" },
  { text: "Cuando soplan vientos de cambio, algunos construyen muros y otros molinos.", author: "Proverbio chino" },
  { text: "El agua que no avanza se estanca.", author: "Proverbio" },
  { text: "La caída de una hoja es una advertencia para el bosque.", author: "Proverbio africano" },
  { text: "Si quieres ir rápido, ve solo; si quieres llegar lejos, ve acompañado.", author: "Proverbio africano" },
  { text: "La sabiduría no se transfiere; se descubre caminando.", author: "Proverbio" },
  { text: "Quien quiere hacer algo encuentra un medio; quien no quiere, encuentra una excusa.", author: "Proverbio árabe" },
  { text: "No digas que no tienes suficiente tiempo; tienes las mismas horas que tuvieron los grandes creadores.", author: "H. Jackson Brown Jr." },
  { text: "El éxito no se mide por lo que logras, sino por los obstáculos que superas.", author: "Booker T. Washington" },
  { text: "La excelencia es hacer cosas comunes de manera extraordinaria.", author: "Booker T. Washington" },
  { text: "Si no puedes volar, corre; si no puedes correr, camina; si no puedes caminar, gatea, pero sigue avanzando.", author: "Martin Luther King Jr." },
  { text: "La fe es dar el primer paso incluso cuando no ves toda la escalera.", author: "Martin Luther King Jr." },
  { text: "La oscuridad no puede expulsar a la oscuridad; solo la luz puede hacerlo.", author: "Martin Luther King Jr." },
  { text: "El momento siempre es correcto para hacer lo correcto.", author: "Martin Luther King Jr." },
  { text: "La esperanza es poder ver que hay luz a pesar de toda la oscuridad.", author: "Desmond Tutu" },
  { text: "Haz el bien donde estés; son esos pequeños bienes juntos los que transforman el mundo.", author: "Desmond Tutu" },
  { text: "No puedes controlar todos los eventos, pero sí puedes decidir no ser reducido por ellos.", author: "Maya Angelou" },
  { text: "La gente olvidará lo que dijiste y lo que hiciste, pero no olvidará cómo la hiciste sentir.", author: "Maya Angelou" },
  { text: "Si no te gusta algo, cámbialo; si no puedes cambiarlo, cambia tu actitud.", author: "Maya Angelou" },
  { text: "Nada funcionará a menos que tú lo hagas.", author: "Maya Angelou" },
  { text: "No hay mayor agonía que llevar una historia no contada dentro de ti.", author: "Maya Angelou" },
  { text: "La duda mata más sueños que el fracaso.", author: "Suzy Kassem" },
  { text: "Cuando una puerta de felicidad se cierra, otra se abre.", author: "Helen Keller" },
  { text: "Lo único peor que ser ciego es tener vista y no tener visión.", author: "Helen Keller" },
  { text: "La seguridad es en gran parte una superstición.", author: "Helen Keller" },

  { text: "El mayor error que puedes cometer es tener miedo de cometer uno.", author: "Elbert Hubbard" },
  { text: "La única diferencia entre un buen día y un mal día es tu actitud.", author: "Dennis S. Brown" },
  { text: "Tu grandeza se revela cuando decides servir a algo más grande que tú.", author: "Anónimo" },
  { text: "La humildad no te hace pequeño; te hace enseñable.", author: "Anónimo" },

  { text: "No esperes claridad absoluta para actuar con honestidad.", author: "Anónimo" },

  { text: "El silencio también puede ser una respuesta sabia.", author: "Anónimo" },

  { text: "La vida florece donde pones atención.", author: "Anónimo" },
  { text: "No puedes cambiar el ayer, pero puedes honrarlo aprendiendo.", author: "Anónimo" },

  { text: "Tu valor no disminuye porque alguien no lo vea.", author: "Anónimo" },
  { text: "La confianza se gana en privado antes de verse en público.", author: "Anónimo" },

  { text: "El carácter se forma en las decisiones que nadie aplaude.", author: "Anónimo" },

  { text: "Lo simple, hecho con constancia, puede cambiar una vida.", author: "Anónimo" },
  { text: "El propósito no siempre aparece como una respuesta; a veces aparece como una responsabilidad.", author: "Anónimo" },
  { text: "Donde pones tu atención, pones tu vida.", author: "Anónimo" },

  { text: "La bondad es fuerza cuando exige valentía.", author: "Anónimo" },

  { text: "El presente es el único lugar donde puedes cambiar algo.", author: "Anónimo" },
  { text: "Lo que agradeces, crece en tu mirada.", author: "Anónimo" },

  { text: "La alegría también se entrena.", author: "Anónimo" },
  { text: "La serenidad es una victoria que no siempre se ve.", author: "Anónimo" },
  { text: "La resiliencia es seguir creyendo en la luz mientras atraviesas la noche.", author: "Anónimo" },
  { text: "Cada persona que encuentras sabe algo que tú no sabes.", author: "Bill Nye" },
  { text: "El aprendizaje es experiencia; todo lo demás es información.", author: "Albert Einstein" },
  { text: "La mente que se abre a una nueva idea jamás vuelve a su tamaño original.", author: "Oliver Wendell Holmes" },
  { text: "El conocimiento es poder.", author: "Francis Bacon" },
  { text: "Invertir en conocimiento siempre paga el mejor interés.", author: "Benjamin Franklin" },
  { text: "Dime y olvido, enséñame y recuerdo, involúcrame y aprendo.", author: "Benjamin Franklin" },
  { text: "No prepares el camino para el niño; prepara al niño para el camino.", author: "Anónimo" },
  { text: "Aprender es descubrir que algo es posible.", author: "Fritz Perls" },
  { text: "Quien se atreve a enseñar nunca debe dejar de aprender.", author: "John Cotton Dana" },
  { text: "La educación no cambia el mundo; cambia a las personas que van a cambiar el mundo.", author: "Paulo Freire" },
  { text: "Nadie educa a nadie; las personas se educan entre sí mediadas por el mundo.", author: "Paulo Freire" },
  { text: "El verdadero viaje de descubrimiento no consiste en buscar nuevos paisajes, sino en mirar con nuevos ojos.", author: "Marcel Proust" },
  { text: "La curiosidad es la mecha de la vela del aprendizaje.", author: "William Arthur Ward" },
  { text: "El mediocre maestro dice; el buen maestro explica; el superior demuestra; el gran maestro inspira.", author: "William Arthur Ward" },
  { text: "La adversidad causa que algunos se rompan y otros rompan récords.", author: "William Arthur Ward" },
  { text: "Las oportunidades son como amaneceres: si esperas demasiado, las pierdes.", author: "William Arthur Ward" },
  { text: "Haz más de lo que se requiere de ti.", author: "George S. Patton" },
  { text: "Acepta los desafíos para sentir la emoción de la victoria.", author: "George S. Patton" },
  { text: "Una buena decisión hoy es mejor que una perfecta mañana.", author: "Anónimo" },
  { text: "La acción imperfecta supera a la intención perfecta.", author: "Anónimo" },
  { text: "Tu próxima oportunidad puede estar escondida en tu próxima responsabilidad.", author: "Anónimo" },
  { text: "No esperes que el camino sea fácil; espera que valga la pena.", author: "Anónimo" },
  { text: "Trabaja en silencio y deja que tus resultados hablen.", author: "Frank Ocean" },
  { text: "El éxito se construye cuando nadie está mirando.", author: "Anónimo" },
  { text: "No hay sustituto para el trabajo duro.", author: "Thomas Edison" },
  { text: "Nuestra mayor debilidad está en rendirnos.", author: "Thomas Edison" },
  { text: "No fracasé; encontré diez mil maneras que no funcionaban.", author: "Thomas Edison" },

  { text: "El éxito depende de la preparación previa.", author: "Confucio" },
  { text: "Quien pregunta es ignorante por un minuto; quien no pregunta, por toda la vida.", author: "Proverbio chino" },
  { text: "Sé tan bueno que no puedan ignorarte.", author: "Steve Martin" },
  { text: "La fortuna favorece a los valientes.", author: "Virgilio" },
  { text: "La vida recompensa a quien se atreve a participar.", author: "Anónimo" },

  { text: "Una meta escrita es un compromiso con tu futuro.", author: "Anónimo" },

  { text: "Lo que empieza con disciplina termina convirtiéndose en identidad.", author: "Anónimo" },

  { text: "Lo que parece lento puede estar echando raíces.", author: "Anónimo" },

  { text: "La visión sin acción es solo un sueño.", author: "Joel A. Barker" },

  { text: "Qué maravilloso es que nadie tenga que esperar para empezar a mejorar el mundo.", author: "Ana Frank" },

  { text: "La pasión es energía.", author: "Oprah Winfrey" },

  { text: "Lo nuevo siempre parece extraño antes de parecer obvio.", author: "Anónimo" },

  { text: "La vida sencilla deja espacio para lo profundo.", author: "Anónimo" },
  { text: "La alegría no siempre llega cuando todo está bien; a veces llega cuando eliges mirar mejor.", author: "Anónimo" },
  { text: "El presente es pequeño, pero contiene toda tu vida.", author: "Anónimo" },

  { text: "Una persona no puede estar cómoda sin su propia aprobación.", author: "Mark Twain" },

  { text: "Elige la bondad siempre que puedas; siempre puedes.", author: "Dalái Lama" },
  { text: "Mi religión es muy simple: mi religión es la bondad.", author: "Dalái Lama" },
  { text: "La paz interior es la clave; si tienes paz interior, los problemas externos no afectan tu sentido profundo.", author: "Dalái Lama" },
  { text: "El propósito de nuestras vidas es ser felices.", author: "Dalái Lama" },

        ];

        function getQuoteOfDay() {
            const today = new Date();
            const startDate = new Date('2026-05-04');
            const dayNumber = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
            const quoteIndex = dayNumber % quotes.length;
            return quotes[quoteIndex];
        }

        function formatDate(date) {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            return date.toLocaleDateString('es-ES', options);
        }

        function loadQuote() {
            const quote = getQuoteOfDay();
            document.getElementById('quoteText').textContent = quote.text;
            document.getElementById('quoteAuthor').textContent = quote.author;
            document.getElementById('dateInfo').textContent = formatDate(new Date());
        }

        // Ejecutar inmediatamente
        loadQuote();
        
        // También ejecutar cuando cargue el DOM
        document.addEventListener('DOMContentLoaded', loadQuote);
    </script>
